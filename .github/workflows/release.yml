name: Build Release

on:
  push:
    tags:
      - "v*.*"
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build executable
        shell: pwsh
        run: .\scripts\build-windows.ps1

      - name: Smoke test executable startup
        shell: pwsh
        run: |
          $process = Start-Process -FilePath ".\dist\RhythmAnalyzer\RhythmAnalyzer.exe" -PassThru
          Start-Sleep -Seconds 8
          if ($process.HasExited) {
            throw "Executable exited during startup smoke test with code $($process.ExitCode)"
          }
          Stop-Process -Id $process.Id -Force

      - name: Archive executable
        shell: pwsh
        run: Compress-Archive -Path dist\RhythmAnalyzer\* -DestinationPath RhythmAnalyzer-windows.zip

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: RhythmAnalyzer-windows.zip
